<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Withdrawal Automation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 420px;
      min-height: 520px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .title { font-size: 15px; font-weight: 600; }
    .subtitle { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .form-group { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
    }
    input::placeholder { color: #64748b; }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-danger { background: #dc2626; color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    .status.visible { display: block; }
    .status.success { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.4); color: #4ade80; }
    .status.error { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); color: #f87171; }
    .status.info { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.4); color: #60a5fa; }
    .row { display: flex; gap: 8px; }
    .row .form-group { flex: 1; }
    .section-title { font-size: 12px; font-weight: 600; margin: 12px 0 8px; color: #94a3b8; }
    .log { margin-top: 8px; max-height: 180px; overflow-y: auto; font-size: 11px; font-family: monospace; color: #94a3b8; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
    .log-hint { font-size: 10px; color: #64748b; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">↻</div>
    <div>
      <div class="title">Agent Withdrawal Automation</div>
      <div class="subtitle">agent.upi9.pro automation</div>
    </div>
  </div>

  <form id="settingsForm">
    <div class="section-title">Panel Login</div>
    <div class="form-group">
      <label>Panel Username</label>
      <input type="text" id="panelUsername" placeholder="surya.k@nexora.tech" required>
    </div>
    <div class="form-group">
      <label>Panel Password</label>
      <input type="password" id="panelPassword" placeholder="••••••••" required>
    </div>

    <div class="section-title">API Configuration</div>
    <div class="form-group">
      <label>DB API URL (Autobot)</label>
      <input type="url" id="dbApiUrl" placeholder="https://autoflow-ce-api.botauto.online" value="https://autoflow-ce-api.botauto.online">
    </div>
    <div class="form-group">
      <label>Login Group Key (optional)</label>
      <input type="text" id="loginGroupKey" placeholder="Filter mismatch orders">
    </div>
    <div class="form-group">
      <label>GatewayHub User ID</label>
      <input type="number" id="gatewayhubUserId" value="1" min="1">
    </div>

    <div class="row">
      <button type="submit" class="btn btn-primary" id="saveBtn">Save Settings</button>
      <button type="button" class="btn btn-secondary" id="startBtn">Start</button>
      <button type="button" class="btn btn-danger" id="stopBtn">Stop</button>
    </div>
    <div style="margin-top: 8px;">
      <button type="button" class="btn btn-secondary" id="testConnectionBtn" style="font-size: 11px; padding: 6px 12px;">Test Service Worker</button>
    </div>
  </form>

  <div id="status" class="status"></div>

  <!-- Two-tab status indicators (shown only when automation is running) -->
  <div id="tabStatus" style="display:none; margin-top:10px; font-size:11px; font-family:monospace;">
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <div style="flex:1; padding:6px 8px; border-radius:5px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);">
        <span style="color:#94a3b8;">📖 Reader:</span>
        <span id="readerTabIndicator" style="color:#64748b;">— inactive</span>
      </div>
      <div style="flex:1; padding:6px 8px; border-radius:5px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1);">
        <span style="color:#94a3b8;">⚡ Mismatch:</span>
        <span id="mismatchTabIndicator" style="color:#64748b;">— inactive</span>
      </div>
    </div>
  </div>

  <div class="section-title" style="margin-top:12px;">Logs</div>
  <div class="log-hint">Two-tab mode: Tab 1 reads rows, Tab 2 clears mismatches — independently. Open F12 on either tab to see logs.</div>
  <div id="log" class="log"></div>

  <script src="popup.js"></script>
</body>
</html>
